<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REACTOR CORE ACCESS</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:"Courier New",monospace;
color:#00ff9c;
background:#000;
overflow:hidden;
}

/* reactor control room background */
body::before{
content:"";
position:fixed;
inset:0;
background:url("https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&w=1600&q=60") center/cover no-repeat;
filter:brightness(0.35);
z-index:0;
}

/* CRT scanlines */
body::after{
content:"";
position:fixed;
inset:0;
background:repeating-linear-gradient(
0deg,
rgba(0,255,120,0.05) 0px,
rgba(0,255,120,0.05) 2px,
transparent 2px,
transparent 4px
);
pointer-events:none;
z-index:2;
}

.terminal{
position:relative;
z-index:3;
background:#001a12;
border:3px solid #00ff9c;
padding:25px;
width:420px;
max-width:92vw;
box-shadow:0 0 25px #00ff9c;
border-radius:6px;
}

h1{
text-align:center;
margin-top:0;
letter-spacing:3px;
}

.timer{
text-align:center;
margin-bottom:10px;
}

.display{
background:#000;
border:2px solid #00ff9c;
font-size:34px;
letter-spacing:14px;
padding:12px;
text-align:center;
margin-bottom:12px;
}

.feedback{
background:#000;
border:2px solid #00ff9c;
height:120px;
overflow:auto;
padding:10px;
margin-bottom:12px;
font-size:18px;
}

.correct{
color:#ffd400;
font-weight:bold;
}

.misplaced{
color:#ff4040;
font-weight:bold;
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
}

button{
background:#00281c;
color:#00ff9c;
border:2px solid #00ff9c;
padding:16px;
font-size:20px;
cursor:pointer;
}

button:hover{
background:#004d36;
}

.controls{
margin-top:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

/* alarm light */
.alarm-light{
width:18px;
height:18px;
border-radius:50%;
background:#400;
margin:8px auto 12px auto;
}

.alarm-on{
animation:alarmFlash 0.6s infinite;
}

@keyframes alarmFlash{
0%{background:#400;box-shadow:0 0 4px #200}
50%{background:#ff0000;box-shadow:0 0 18px #ff0000}
100%{background:#400;box-shadow:0 0 4px #200}
}

/* success screen */
.message-screen{
position:fixed;
inset:0;
background:#000;
color:#00ff9c;
font-family:"Courier New",monospace;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:30px;
text-align:center;
letter-spacing:3px;
z-index:10;
}

.message-screen a{
margin-top:30px;
color:#00ff9c;
border:2px solid #00ff9c;
padding:12px 20px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="terminal">

<h1>REACTOR CORE ACCESS</h1>

<div class="timer">REACTOR TIMER: <span id="timer">120</span>s</div>

<div class="alarm-light" id="alarmLight"></div>

<div id="display" class="display">----</div>

<div id="feedback" class="feedback"></div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="press(0)">0</button>
</div>

<div class="controls">
<button onclick="check()">ENTER</button>
<button onclick="clearInput()">CLEAR</button>
</div>

</div>

<script>

let secret="";
for(let i=0;i<4;i++) secret+=Math.floor(Math.random()*10);

let input="";
let time=120;

const display=document.getElementById("display");
const feedback=document.getElementById("feedback");
const timerEl=document.getElementById("timer");

function beep(freq,duration){
const ctx=new(window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
const gain=ctx.createGain();
osc.connect(gain);
gain.connect(ctx.destination);
osc.frequency.value=freq;
osc.start();
gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+duration/1000);
setTimeout(()=>ctx.close(),duration);
}

function updateDisplay(){
display.innerText=input.padEnd(4,"-");
}

function press(n){
if(input.length<4){
input+=n;
beep(600,80);
updateDisplay();
}
}

function clearInput(){
input="";
updateDisplay();
}

function check(){

if(input.length!==4) return;

let resultHTML="";

for(let i=0;i<4;i++){
if(input[i]===secret[i]){
resultHTML+=`<span class='correct'>${input[i]}</span> `;
}
else if(secret.includes(input[i])){
resultHTML+=`<span class='misplaced'>${input[i]}</span> `;
}
else{
resultHTML+=input[i]+" ";
}
}

feedback.innerHTML=`${input} → ${resultHTML}<br>`+feedback.innerHTML;

if(input===secret){
beep(1200,300);

const authCode="AUTH-"+Math.random().toString(36).substring(2,8).toUpperCase();

const screen=document.createElement("div");
screen.className="message-screen";

screen.innerHTML=`
SIKERES BELÉPÉS ☢<br><br>
AUTORIZÁCIÓS KÓD:<br>
${authCode}
<br><br>
<a href="https://forms.gle/PASTE_YOUR_GOOGLE_FORM_LINK_HERE?code=${authCode}">
TOVÁBB A HITELESÍTÉSHEZ
</a>
`;


document.body.appendChild(screen);
}

input="";
updateDisplay();
}

setInterval(()=>{

time--;
timerEl.textContent=time;

if(time<20){
beep(150,60);
document.getElementById("alarmLight").classList.add("alarm-on");
}

if(time<=0){
alert("HOZZÁFÉRÉS MEGTAGADVA – REACTOR LOCKDOWN");
location.reload();
}

},1000);

updateDisplay();

</script>

</body>
</html>
