<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Reaktor hozzáférési terminál</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:monospace;
color:#0f0;

background:
linear-gradient(rgba(0,0,0,.8),rgba(0,0,0,.95)),
url("https://images.unsplash.com/photo-1545259741-2ea3ebf61fa3") center/cover;
}

.panel{
width:360px;
padding:25px;
background:#001a12;
border:2px solid #00ff88;
border-radius:12px;
box-shadow:
0 0 15px #00ff88,
0 0 40px #00ff88 inset;
text-align:center;
}

h1{
font-size:18px;
margin-top:0;
letter-spacing:2px;
}

.display{
background:black;
color:#00ff88;
font-size:32px;
padding:12px;
margin-bottom:12px;
letter-spacing:10px;
border:1px solid #00ff88;
box-shadow:
0 0 10px #00ff88 inset,
0 0 10px #00ff88;
}

.timer{
margin-bottom:10px;
font-size:16px;
}

.timer.warning{
color:#ff3030;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
}

button{
background:#002b1f;
border:1px solid #00ff88;
color:#00ff88;
font-size:18px;
padding:12px;
cursor:pointer;
transition:.15s;
}

button:hover{
background:#005c40;
box-shadow:0 0 10px #00ff88;
}

.log{
margin-top:15px;
font-size:14px;
text-align:left;
max-height:120px;
overflow:auto;
}

.red{color:#ff4040}
.yellow{color:#ffd740}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#001a12;
border:2px solid #00ff88;
padding:30px;
box-shadow:0 0 40px #00ff88;
display:none;
text-align:center;
}

.popup h2{
margin-top:0;
}

a{
color:#7fff7f;
font-size:18px;
}

</style>
</head>

<body>

<div class="panel">

<h1>REAKTOR HOZZÁFÉRÉS</h1>

<div id="display" class="display">----</div>

<div id="timer" class="timer">
Hátralévő idő: <span id="time">120</span> s
</div>

<div class="keypad">

<button onclick="add(1)">1</button>
<button onclick="add(2)">2</button>
<button onclick="add(3)">3</button>

<button onclick="add(4)">4</button>
<button onclick="add(5)">5</button>
<button onclick="add(6)">6</button>

<button onclick="add(7)">7</button>
<button onclick="add(8)">8</button>
<button onclick="add(9)">9</button>

<button onclick="cancel()">C</button>
<button onclick="add(0)">0</button>
<button onclick="enter()">ENTER</button>

</div>

<div id="log" class="log"></div>

</div>

<div id="popup" class="popup">

<h2>BELÉPÉS ENGEDÉLYEZVE</h2>

<p>
<a href="https://forms.gle/" target="_blank">
Tovább az engedélyezési űrlaphoz
</a>
</p>

</div>

<script>

let code=Math.floor(1000+Math.random()*9000).toString()
let input=""

function beep(){
let ctx=new (window.AudioContext||window.webkitAudioContext)()
let osc=ctx.createOscillator()
osc.connect(ctx.destination)
osc.start()
osc.frequency.value=500
setTimeout(()=>osc.stop(),80)
}

function updateDisplay(){
let d=input.padEnd(4,"-")
document.getElementById("display").innerText=d
}

function add(n){
if(input.length<4){
input+=n
updateDisplay()
beep()
}
}

function cancel(){
input=input.slice(0,-1)
updateDisplay()
beep()
}

function enter(){

if(input.length!==4)return

beep()

let result=""
let usedCode=[false,false,false,false]
let usedInput=[false,false,false,false]

for(let i=0;i<4;i++){

if(input[i]===code[i]){
result+=`<span class="red">${input[i]}</span>`
usedCode[i]=true
usedInput[i]=true
}else{
result+=input[i]
}

}

for(let i=0;i<4;i++){

if(!usedInput[i]){

for(let j=0;j<4;j++){

if(!usedCode[j] && input[i]===code[j]){

result=result.replace(input[i],
`<span class="yellow">${input[i]}</span>`)

usedCode[j]=true
break

}

}

}

}

let log=document.getElementById("log")
log.innerHTML=result+"<br>"+log.innerHTML

if(input===code){
document.getElementById("popup").style.display="block"
}

input=""
updateDisplay()

}

let time=120

let timer=setInterval(()=>{

time--

document.getElementById("time").innerText=time

if(time<20){
document.getElementById("timer").classList.add("warning")
}

if(time<=0){

clearInterval(timer)

alert("REAKTOR ZÁROLVA – HOZZÁFÉRÉS MEGTAGADVA")

location.reload()

}

},1000)

updateDisplay()

</script>

</body>
</html>
