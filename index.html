<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Reaktor kódpanel</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:monospace;
color:#0f0;

background:
linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1601582589907-f92af5ed9db8") center/cover;

}

/* PANEL */

.panel{
background:#021;
border:2px solid #00ff88;
padding:25px;
box-shadow:
0 0 20px #00ff88,
0 0 40px #00ff88 inset;
border-radius:12px;
width:340px;
text-align:center;
}

/* KIJELZŐ */

.display{
background:black;
color:#00ff88;
font-size:30px;
padding:12px;
margin-bottom:12px;
letter-spacing:12px;
border:1px solid #00ff88;
box-shadow:0 0 12px #00ff88 inset;
}

/* IDŐZÍTŐ */

.timer{
margin-bottom:12px;
font-size:16px;
}

.timer.warning{
color:#ff4040;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

/* BILLENTYŰK */

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:10px;
}

button{
padding:14px;
font-size:18px;
background:#032;
border:1px solid #00ff88;
color:#00ff88;
cursor:pointer;
}

button:hover{
background:#064;
box-shadow:0 0 10px #00ff88;
}

/* LOG */

.log{
margin-top:15px;
text-align:left;
font-size:14px;
max-height:120px;
overflow:auto;
}

.red{color:#ff4040}
.yellow{color:#ffd740}

/* POPUP */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#011;
border:2px solid #00ff88;
padding:30px;
display:none;
box-shadow:0 0 35px #00ff88;
text-align:center;
}

.popup h2{
margin-top:0;
}

a{
color:#7fff7f;
font-size:18px;
}

</style>
</head>

<body>

<div class="panel">

<h2>REAKTOR HOZZÁFÉRÉS</h2>

<div class="display" id="display">----</div>

<div class="timer" id="timer">
Hátralévő idő: <span id="time">120</span> s
</div>

<div class="keypad">

<button onclick="add(1)">1</button>
<button onclick="add(2)">2</button>
<button onclick="add(3)">3</button>

<button onclick="add(4)">4</button>
<button onclick="add(5)">5</button>
<button onclick="add(6)">6</button>

<button onclick="add(7)">7</button>
<button onclick="add(8)">8</button>
<button onclick="add(9)">9</button>

<button onclick="cancel()">C</button>
<button onclick="add(0)">0</button>
<button onclick="enter()">ENTER</button>

</div>

<div class="log" id="log"></div>

</div>

<div class="popup" id="popup">

<h2 id="popupText"></h2>

<p id="formLink" style="display:none;">
<a href="https://forms.gle/" target="_blank">
Tovább az engedélyezési űrlaphoz
</a>
</p>

</div>

<script>

let code=Math.floor(1000+Math.random()*9000).toString()

let input=""

function updateDisplay(){
let d=input.padEnd(4,"-")
document.getElementById("display").innerText=d
}

function add(n){
if(input.length<4){
input+=n
updateDisplay()
}
}

function cancel(){
input=input.slice(0,-1)
updateDisplay()
}

function enter(){

if(input.length!==4)return

let result=""
let usedCode=[false,false,false,false]
let usedInput=[false,false,false,false]

for(let i=0;i<4;i++){

if(input[i]===code[i]){

result+=`<span class="red">${input[i]}</span>`
usedCode[i]=true
usedInput[i]=true

}else{

result+=input[i]

}

}

for(let i=0;i<4;i++){

if(!usedInput[i]){

for(let j=0;j<4;j++){

if(!usedCode[j] && input[i]===code[j]){

result=result.replace(input[i],
`<span class="yellow">${input[i]}</span>`)

usedCode[j]=true
break

}

}

}

}

let log=document.getElementById("log")
log.innerHTML=result+"<br>"+log.innerHTML

if(input===code){

showPopup("BELÉPÉS ENGEDÉLYEZVE",true)

}

input=""
updateDisplay()

}

function showPopup(text,success){

document.getElementById("popupText").innerText=text

if(success)
document.getElementById("formLink").style.display="block"

document.getElementById("popup").style.display="block"

}

/* IDŐZÍTŐ */

let time=120

let timer=setInterval(()=>{

time--

document.getElementById("time").innerText=time

if(time<20)
document.getElementById("timer").classList.add("warning")

if(time<=0){

clearInterval(timer)

showPopup("HOZZÁFÉRÉS MEGTAGADVA",false)

}

},1000)

updateDisplay()

</script>

</body>
</html>
