<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>REACTOR ACCESS TERMINAL</title>

<style>
body{
    background:#020;
    color:#0f0;
    font-family: "Courier New", monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.terminal{
    background:#001100;
    border:4px solid #0f0;
    padding:20px;
    width:420px;
    box-shadow:0 0 20px #0f0;
}

h1{
    text-align:center;
    font-size:20px;
    margin-bottom:10px;
}

.display{
    background:black;
    padding:15px;
    font-size:30px;
    letter-spacing:10px;
    text-align:center;
    border:2px solid #0f0;
    margin-bottom:10px;
}

.feedback{
    min-height:80px;
    border:2px solid #0f0;
    padding:10px;
    margin-bottom:10px;
}

.correct{
    color:#00ff00;
    font-weight:bold;
}

.misplaced{
    color:#ff3333;
    font-weight:bold;
}

.keypad{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

button{
    background:#002200;
    color:#0f0;
    border:2px solid #0f0;
    padding:15px;
    font-size:20px;
    cursor:pointer;
}

button:hover{
    background:#003300;
}

.controls{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="terminal">
<h1>REACTOR ACCESS TERMINAL</h1>

<div id="display" class="display">----</div>

<div id="feedback" class="feedback"></div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="press(0)">0</button>
</div>

<div class="controls">
<button onclick="check()">ENTER</button>
<button onclick="clearInput()">C</button>
</div>

</div>

<script>

let secret = "";
for(let i=0;i<4;i++){
    secret += Math.floor(Math.random()*10);
}

let input="";

function updateDisplay(){
    document.getElementById("display").innerText =
        input.padEnd(4,"-");
}

function press(num){
    if(input.length<4){
        input+=num;
        updateDisplay();
    }
}

function clearInput(){
    input="";
    updateDisplay();
}

function check(){

    if(input.length!==4){
        alert("4 számjegy kell!");
        return;
    }

    let result="";

    for(let i=0;i<4;i++){

        if(input[i]===secret[i]){
            result+=`<span class="correct">${input[i]}</span>`;
        }
        else if(secret.includes(input[i])){
            result+=`<span class="misplaced">${input[i]}</span>`;
        }
        else{
            result+=input[i];
        }

        result+=" ";
    }

    let feedback=document.getElementById("feedback");
    feedback.innerHTML = input + " → " + result + "<br>" + feedback.innerHTML;

    if(input===secret){
        alert("HOZZÁFÉRÉS ENGEDÉLYEZVE ☢️");
        location.reload();
    }

    input="";
    updateDisplay();
}

updateDisplay();

</script>

</body>
</html>
